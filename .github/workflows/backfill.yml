name: Run Lobbyist Backfill

on:
  workflow_dispatch: # This keeps it purely manual so it only runs when you click the button

jobs:
  backfill:
    runs-on: ubuntu-latest

    # Give this specific job a longer timeout window since downloading 1,100+ PDFs takes time
    timeout-minutes: 45 

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas playwright pypdf

    - name: Install Playwright Chromium Browser
      run: |
        playwright install chromium

    - name: Run Historical Backfill Script
      run: |
        python alberta_backfill.py

    - name: Commit and Push Historical Archive Changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add alberta_lobbyists_historical.csv || true
        git commit -m "Automated Backfill: Populated comprehensive historical data matrix" || true
        git push || true

    - name: Upload Diagnostic Debug Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backfill-debug-logs
        path: |
          debug_screenshot.png
          debug_page.html
        if-no-files-found: ignore
