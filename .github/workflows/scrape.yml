name: Run Lobbyist Scraper

on:
  schedule:
    - cron: '0 12 * * *' # Automatically runs every day at 12:00 UTC
  workflow_dispatch: # Allows you to manually click "Run workflow" inside GitHub Actions

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas playwright pypdf

    - name: Install Playwright Chromium Browser
      run: |
        playwright install chromium

    - name: Run Scraper Script
      run: |
        python alberta_lobbyist_scraper.py

    - name: Commit and Push Registry Baseline Changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add alberta_lobbyists.csv || true
        git commit -m "Automated Sync: Updated Alberta lobbyist baseline data matrix" || true
        git push || true

    - name: Upload Diagnostic Debug Artifacts
      uses: actions/upload-artifact@v4
      if: always() # Forces this step to run even if the scraper crashes, ensuring you always get your diagnostic files
      with:
        name: registry-debug-logs
        path: |
          debug_screenshot.png
          debug_page.html
        if-no-files-found: ignore
